<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>P2P 1v1 FPS Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #050000; color: white; user-select: none; -webkit-user-select: none; font-family: 'Courier New', Courier, monospace; }
    #game-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
    .pointer-auto { pointer-events: auto; }
    
    /* Crosshair */
    .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; }
    .crosshair::before, .crosshair::after { content: ''; position: absolute; background: #00ffcc; box-shadow: 0 0 5px #00ffcc; }
    .crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    .crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    
    /* Damage Overlay */
    #damage-overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, rgba(255, 0, 0, 0.7) 100%); opacity: 0; pointer-events: none; transition: opacity 0.1s ease-out; z-index: 5; }
    
    /* UI Animations */
    .spinner { border: 4px solid rgba(255,0,0,0.3); border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .glitch-text { animation: glitch 2s linear infinite; }
    @keyframes glitch { 2%, 64% { transform: translate(2px,0) skew(0deg); } 4%, 60% { transform: translate(-2px,0) skew(0deg); } 62% { transform: translate(0,0) skew(5deg); } }
  </style>
</head>
<body>

  <!-- 3D Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- UI Layer -->
  <div id="ui-layer" class="flex items-center justify-center">

    <!-- 1. Login Screen -->
    <div id="screen-login" class="pointer-auto bg-black/90 p-8 rounded-xl shadow-[0_0_20px_rgba(255,0,0,0.4)] text-center max-w-sm w-full backdrop-blur-md border border-red-900">
      <h1 class="text-4xl font-black mb-6 text-red-600 tracking-widest glitch-text">DEATH MATCH</h1>
      <p class="text-gray-400 mb-8 text-sm">Googleアカウントで認証しろ</p>
      <button id="btn-login" class="w-full bg-red-700 text-white font-bold py-3 px-4 rounded hover:bg-red-600 hover:shadow-[0_0_15px_rgba(255,0,0,0.8)] transition flex items-center justify-center gap-2">
        Google Login
      </button>
    </div>

    <!-- 2. Lobby Screen -->
    <div id="screen-lobby" class="hidden pointer-auto bg-black/90 p-8 rounded-xl shadow-[0_0_20px_rgba(255,0,0,0.4)] text-center max-w-md w-full backdrop-blur-md border border-red-900">
      <h2 class="text-2xl font-bold mb-2 text-red-500 uppercase">Arena Lobby</h2>
      <p id="user-name" class="text-gray-400 mb-6 font-medium">Player</p>
      
      <div class="space-y-4">
        <button id="btn-create-room" class="w-full bg-red-900 hover:bg-red-800 text-white font-bold py-3 px-4 rounded border border-red-700 transition shadow-[0_0_10px_rgba(255,0,0,0.2)]">
          ホストになる (Host)
        </button>
        <div class="relative flex items-center py-2">
          <div class="flex-grow border-t border-red-900"></div>
          <span class="flex-shrink-0 mx-4 text-gray-600 text-sm">OR</span>
          <div class="flex-grow border-t border-red-900"></div>
        </div>
        <button id="btn-scan-qr" class="w-full bg-orange-900 hover:bg-orange-800 text-white font-bold py-3 px-4 rounded border border-orange-700 transition">
          QRスキャン (Guest)
        </button>
        <div class="flex gap-2">
          <input type="text" id="input-room-id" placeholder="ルームID" class="flex-1 bg-black text-red-500 px-3 py-2 rounded border border-red-900 focus:outline-none focus:border-red-500 focus:shadow-[0_0_10px_rgba(255,0,0,0.5)]">
          <button id="btn-join-room" class="bg-red-800 hover:bg-red-700 px-4 py-2 rounded transition">参加</button>
        </div>
      </div>
    </div>

    <!-- 3. Waiting / Host Screen -->
    <div id="screen-waiting" class="hidden pointer-auto bg-black/90 p-8 rounded-xl shadow-[0_0_20px_rgba(255,0,0,0.4)] text-center max-w-sm w-full backdrop-blur-md border border-red-900">
      <h2 class="text-xl font-bold mb-4 text-red-500 animate-pulse">標的を待機中...</h2>
      <div id="qrcode-container" class="bg-white p-4 rounded-lg inline-block mb-4 shadow-[0_0_15px_rgba(255,255,255,0.2)]"></div>
      <p class="text-sm text-gray-400 mb-1">ROOM ID: <span id="display-room-id" class="font-mono font-bold text-red-400 select-all">---</span></p>
      <div class="spinner mb-4 mt-4"></div>
      <button id="btn-cancel-room" class="text-sm text-gray-500 hover:text-gray-300 underline">アボート</button>
    </div>

    <!-- 4. QR Scanner Screen -->
    <div id="screen-scanner" class="hidden pointer-auto bg-black p-4 rounded-xl shadow-[0_0_20px_rgba(255,0,0,0.4)] max-w-md w-full relative border border-red-900">
      <h2 class="text-lg font-bold mb-2 text-center text-red-500">TARGET QR SCAN</h2>
      <div id="reader" class="w-full bg-gray-900 rounded overflow-hidden border border-red-900"></div>
      <button id="btn-close-scanner" class="absolute top-4 right-4 bg-red-900 p-2 rounded-full text-white hover:bg-red-700">✕</button>
    </div>

    <!-- 5. Connecting Screen -->
    <div id="screen-connecting" class="hidden pointer-auto bg-black/90 p-8 rounded-xl shadow-[0_0_20px_rgba(255,0,0,0.4)] text-center border border-red-900">
      <h2 class="text-2xl font-bold mb-4 text-orange-500 glitch-text">P2P LINK ESTABLISHING...</h2>
      <div class="spinner"></div>
    </div>

    <!-- 6. Game HUD -->
    <div id="screen-game" class="hidden absolute inset-0 w-full h-full pointer-events-none">
      <div id="damage-overlay"></div>
      <div class="crosshair"></div>
      
      <!-- Status Bars -->
      <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-10">
        <div class="bg-black/60 p-3 rounded border border-red-900 backdrop-blur-sm">
          <p class="text-xs text-red-500 mb-1 font-bold">ARMOR [YOU]</p>
          <div class="w-48 h-4 bg-gray-900 rounded overflow-hidden border border-gray-700">
            <div id="my-hp-bar" class="h-full bg-cyan-500 shadow-[0_0_10px_cyan] transition-all duration-200" style="width: 100%;"></div>
          </div>
        </div>
        <div class="bg-black/60 p-3 rounded border border-red-900 backdrop-blur-sm text-right">
          <p class="text-xs text-red-500 mb-1 font-bold">TARGET [ENEMY]</p>
          <div class="w-48 h-4 bg-gray-900 rounded overflow-hidden border border-gray-700 flex justify-end">
            <div id="enemy-hp-bar" class="h-full bg-red-600 shadow-[0_0_10px_red] transition-all duration-200" style="width: 100%;"></div>
          </div>
        </div>
      </div>

      <!-- Start Message -->
      <div id="game-msg" class="absolute top-1/4 left-1/2 -translate-x-1/2 text-6xl font-black text-red-600 tracking-widest drop-shadow-[0_0_20px_rgba(255,0,0,1)] transition-opacity duration-1000 opacity-0 z-10 glitch-text">KILL OR BE KILLED</div>

      <!-- PC Helper -->
      <div id="pc-helper" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/80 px-4 py-2 rounded border border-red-900 text-xs text-red-400 z-10 uppercase tracking-widest">
        Click to lock aim / W,A,S,D: Move / Mouse: Look / L-Click: Fire
      </div>

      <!-- Mobile Controls -->
      <div id="mobile-controls" class="hidden absolute inset-0 w-full h-full z-10">
        <!-- Joystick Area (Left) -->
        <div id="zone-joystick" class="absolute bottom-10 left-10 w-36 h-36 bg-red-900/10 rounded-full pointer-auto touch-none border-2 border-red-600/30">
          <div id="joystick-knob" class="absolute top-1/2 left-1/2 w-14 h-14 bg-red-600/50 rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none shadow-[0_0_15px_rgba(255,0,0,0.5)]"></div>
        </div>
        <!-- Look Area (Right Half) -->
        <div id="zone-look" class="absolute top-0 right-0 w-1/2 h-full pointer-auto touch-none"></div>
        <!-- Shoot Button -->
        <div id="btn-shoot" class="absolute bottom-12 right-12 w-24 h-24 bg-red-600/40 border-2 border-red-500 rounded-full pointer-auto flex items-center justify-center text-white font-black text-2xl active:bg-red-500/80 active:scale-90 transition touch-none shadow-[0_0_20px_rgba(255,0,0,0.6)] backdrop-blur-sm">
          FIRE
        </div>
      </div>
    </div>

    <!-- 7. Result Screen -->
    <div id="screen-result" class="hidden pointer-auto bg-black/90 p-10 rounded-xl shadow-[0_0_30px_rgba(255,0,0,0.6)] text-center backdrop-blur-md border border-red-900">
      <h2 id="result-title" class="text-6xl font-black mb-4 uppercase tracking-widest"></h2>
      <p id="result-desc" class="text-gray-400 mb-8 font-mono"></p>
      <button id="btn-back-lobby" class="bg-red-800 text-white font-bold py-3 px-8 rounded hover:bg-red-600 border border-red-500 transition shadow-[0_0_15px_rgba(255,0,0,0.5)]">RETURN TO LOBBY</button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // --- Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyDZMYlpvok4QqOfVqPtDFxcp6oi4bGm-Fw",
      authDomain: "p2p-fps.firebaseapp.com",
      projectId: "p2p-fps",
      storageBucket: "p2p-fps.firebasestorage.app",
      messagingSenderId: "806639973235",
      appId: "1:806639973235:web:aa5bef6d3f7882dcbbcb06",
      measurementId: "G-JB9W5W3CL4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Global State ---
    let currentUser = null;
    let peerConnection = null;
    let dataChannel = null;
    let currentRoomId = null;
    let html5QrCode = null;
    let isHost = false;
    let gameState = 'LOGIN';
    
    // Game State
    let myHP = 100;
    let enemyHP = 100;
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    // WebRTC Configuration
    const rtcConfig = { iceServers: [ { urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun2.l.google.com:19302' } ] };

    // --- UI Elements ---
    const screens = {
      login: document.getElementById('screen-login'),
      lobby: document.getElementById('screen-lobby'),
      waiting: document.getElementById('screen-waiting'),
      scanner: document.getElementById('screen-scanner'),
      connecting: document.getElementById('screen-connecting'),
      game: document.getElementById('screen-game'),
      result: document.getElementById('screen-result')
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.add('hidden'));
      if(screens[name]) screens[name].classList.remove('hidden');
      gameState = name;
      
      if (name === 'game') {
        if (!isMobile) screens.game.classList.add('pointer-auto');
        if (isMobile) document.getElementById('mobile-controls').classList.remove('hidden');
        else document.getElementById('pc-helper').classList.remove('hidden');
        resetGameStats();
        
        const msg = document.getElementById('game-msg');
        msg.classList.remove('opacity-0');
        setTimeout(() => msg.classList.add('opacity-0'), 2000);
      } else {
        screens.game.classList.remove('pointer-auto');
        if (document.pointerLockElement === document.body) document.exitPointerLock();
      }
    }

    // --- Authentication ---
    document.getElementById('btn-login').addEventListener('click', () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider).catch(error => { console.error("Login error:", error); alert("ログイン失敗: " + error.message); });
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('user-name').innerText = `AGENT: ${user.displayName || user.email}`;
        const urlParams = new URLSearchParams(window.location.search);
        const roomToJoin = urlParams.get('room');
        if (roomToJoin) joinRoom(roomToJoin); else showScreen('lobby');
      } else {
        showScreen('login');
      }
    });

    // --- WebRTC & Signaling ---
    async function createRoom() {
      showScreen('waiting');
      isHost = true;
      setupWebRTC();
      dataChannel = peerConnection.createDataChannel('gameData');
      setupDataChannel(dataChannel);

      const roomRef = doc(collection(db, "rooms"));
      currentRoomId = roomRef.id;
      
      document.getElementById('display-room-id').innerText = currentRoomId;
      const joinUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoomId}`;
      document.getElementById('qrcode-container').innerHTML = '';
      new QRCode(document.getElementById('qrcode-container'), { text: joinUrl, width: 150, height: 150, colorDark: "#880000" });

      const callerCandidatesCollection = collection(roomRef, 'callerCandidates');
      peerConnection.addEventListener('icecandidate', event => {
        if (event.candidate) addDoc(callerCandidatesCollection, event.candidate.toJSON());
      });

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      await setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp }, createdAt: new Date() });

      const unsub = onSnapshot(roomRef, async snapshot => {
        const data = snapshot.data();
        if (!peerConnection.currentRemoteDescription && data && data.answer) {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
      });

      const calleeCandidatesCollection = collection(roomRef, 'calleeCandidates');
      onSnapshot(calleeCandidatesCollection, snapshot => {
        snapshot.docChanges().forEach(async change => {
          if (change.type === 'added') await peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
        });
      });
      peerConnection._unsubRoom = unsub;
    }

    async function joinRoom(roomId) {
      if(!roomId) return;
      showScreen('connecting');
      isHost = false;
      currentRoomId = roomId;
      
      const roomRef = doc(db, "rooms", roomId);
      const roomSnapshot = await getDoc(roomRef);

      if (!roomSnapshot.exists()) { alert("ルームが見つかりません。"); showScreen('lobby'); return; }

      setupWebRTC();

      peerConnection.addEventListener('datachannel', event => {
        dataChannel = event.channel;
        setupDataChannel(dataChannel);
      });

      const calleeCandidatesCollection = collection(roomRef, 'calleeCandidates');
      peerConnection.addEventListener('icecandidate', event => {
        if (event.candidate) addDoc(calleeCandidatesCollection, event.candidate.toJSON());
      });

      const offer = roomSnapshot.data().offer;
      await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      await setDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } }, { merge: true });

      const callerCandidatesCollection = collection(roomRef, 'callerCandidates');
      onSnapshot(callerCandidatesCollection, snapshot => {
        snapshot.docChanges().forEach(async change => {
          if (change.type === 'added') await peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
        });
      });
    }

    function setupWebRTC() {
      if(peerConnection) peerConnection.close();
      peerConnection = new RTCPeerConnection(rtcConfig);
      peerConnection.addEventListener('connectionstatechange', () => {
        if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
          if(gameState === 'game') endGame('LINK LOST', '通信が切断されました');
        }
      });
    }

    function setupDataChannel(channel) {
      channel.onopen = () => { showScreen('game'); window.history.replaceState({}, document.title, window.location.pathname); };
      channel.onclose = () => { if(gameState === 'game') endGame('LINK LOST', '相手が逃亡しました'); };
      channel.onmessage = (event) => { if(gameState === 'game') handleNetworkMessage(JSON.parse(event.data)); };
    }

    function sendNetworkMessage(msgObj) {
      if (dataChannel && dataChannel.readyState === 'open') dataChannel.send(JSON.stringify(msgObj));
    }

    // --- UI Listeners ---
    document.getElementById('btn-create-room').addEventListener('click', createRoom);
    document.getElementById('btn-join-room').addEventListener('click', () => joinRoom(document.getElementById('input-room-id').value.trim()));
    document.getElementById('btn-cancel-room').addEventListener('click', () => { if(peerConnection) peerConnection.close(); showScreen('lobby'); });
    document.getElementById('btn-back-lobby').addEventListener('click', () => { if(peerConnection) peerConnection.close(); showScreen('lobby'); });

    document.getElementById('btn-scan-qr').addEventListener('click', () => {
      showScreen('scanner');
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          html5QrCode.stop().then(() => {
            let id = decodedText;
            if(id.includes('?room=')) id = new URL(id).searchParams.get('room');
            joinRoom(id);
          });
        }, () => {}
      ).catch(() => { alert("カメラ起動失敗。"); showScreen('lobby'); });
    });
    document.getElementById('btn-close-scanner').addEventListener('click', () => { if(html5QrCode) html5QrCode.stop(); showScreen('lobby'); });


    // ==========================================
    // Three.js Game Engine - DANGEROUS OVERHAUL
    // ==========================================
    
    const canvas = document.getElementById('game-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    const bgColor = 0x0a0000; // 暗黒の赤
    scene.background = new THREE.Color(bgColor);
    scene.fog = new THREE.FogExp2(bgColor, 0.04);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
    const cameraContainer = new THREE.Object3D();
    scene.add(cameraContainer);
    cameraContainer.add(camera);
    camera.position.set(0, 1.6, 0);

    // --- Weapon (ViewModel) ---
    const weaponGroup = new THREE.Group();
    // 画面右下に固定（カメラの子要素）
    weaponGroup.position.set(0.25, -0.25, -0.4);
    camera.add(weaponGroup);

    // 銃身
    const barrelGeo = new THREE.BoxGeometry(0.06, 0.06, 0.4);
    const barrelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
    const barrelMesh = new THREE.Mesh(barrelGeo, barrelMat);
    barrelMesh.position.set(0, 0, -0.1);
    weaponGroup.add(barrelMesh);

    // 手 (グローブ)
    const handGeo = new THREE.BoxGeometry(0.1, 0.1, 0.12);
    const handMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const handMesh = new THREE.Mesh(handGeo, handMat);
    handMesh.position.set(0, -0.05, 0.1);
    weaponGroup.add(handMesh);

    // マズルフラッシュ用のライト
    const muzzleLight = new THREE.PointLight(0xffaa00, 0, 8);
    muzzleLight.position.set(0, 0, -0.35);
    weaponGroup.add(muzzleLight);

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.1); // 全体を暗く
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffaa55, 0.5);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // デンジャラスな赤いライトを配置
    const redLight1 = new THREE.PointLight(0xff0000, 2, 30);
    redLight1.position.set(10, 5, 10);
    scene.add(redLight1);
    const redLight2 = new THREE.PointLight(0xff0000, 2, 30);
    redLight2.position.set(-10, 5, -10);
    scene.add(redLight2);

    // --- Map Generation (Cyber Arena) ---
    const collidables = [];
    
    // Floor
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.2 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 赤いネオングリッド
    const grid = new THREE.GridHelper(100, 50, 0x880000, 0x330000);
    grid.position.y = 0.01;
    scene.add(grid);

    // Walls & Obstacles
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const boxMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x440000 }); // エッジを赤く

    function addBox(x, z, w, h, d) {
      const box = new THREE.Mesh(boxGeo, boxMat);
      box.scale.set(w, h, d);
      box.position.set(x, h/2, z);
      box.castShadow = true;
      box.receiveShadow = true;
      scene.add(box);
      collidables.push(box);

      // ワイヤーフレームエッジ追加でサイバー感
      const edges = new THREE.EdgesGeometry(boxGeo);
      const line = new THREE.LineSegments(edges, edgeMat);
      line.scale.set(w, h, d);
      line.position.set(x, h/2, z);
      scene.add(line);
    }

    addBox(0, -25, 50, 5, 1);
    addBox(0, 25, 50, 5, 1);
    addBox(-25, 0, 1, 5, 50);
    addBox(25, 0, 1, 5, 50);
    
    for(let i=0; i<20; i++) {
      let x = (Math.random() - 0.5) * 40;
      let z = (Math.random() - 0.5) * 40;
      if (Math.abs(x) < 5 && Math.abs(z) < 5) continue;
      addBox(x, z, Math.random()*3+1, Math.random()*4+2, Math.random()*3+1);
    }

    // --- Enemy Avatar (Dangerous Robot) ---
    const enemyGroup = new THREE.Group();
    scene.add(enemyGroup);
    enemyGroup.position.set(0, -10, 0); // 初期位置隠す

    // Body
    const eBodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.6);
    const eBodyMat = new THREE.MeshStandardMaterial({ color: 0x550000, metalness: 0.5 });
    const eBody = new THREE.Mesh(eBodyGeo, eBodyMat);
    eBody.position.y = 0.6;
    eBody.castShadow = true;
    enemyGroup.add(eBody);

    // Head
    const eHeadGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
    const eHeadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const eHead = new THREE.Mesh(eHeadGeo, eHeadMat);
    eHead.position.y = 1.5;
    eHead.castShadow = true;
    enemyGroup.add(eHead);

    // Glowing Eyes
    const eyeGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // 自己発光風
    const eEyes = new THREE.Mesh(eyeGeo, eyeMat);
    eEyes.position.set(0, 1.55, -0.26);
    enemyGroup.add(eEyes);
    
    // --- Particles System (Blood/Sparks) ---
    const particles = [];
    const pGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

    function spawnHitParticles(pos) {
      for(let i=0; i<15; i++) {
        const p = new THREE.Mesh(pGeo, pMat);
        p.position.copy(pos);
        const vel = new THREE.Vector3((Math.random()-0.5)*0.6, Math.random()*0.6, (Math.random()-0.5)*0.6);
        scene.add(p);
        particles.push({ mesh: p, vel: vel, life: 1.0 });
      }
    }

    // --- Input Handling ---
    
    const keys = { w: false, a: false, s: false, d: false };
    document.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    document.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

    let pitch = 0, yaw = 0;
    
    // PC PointerLock & Look (感度を少し下げて滑らかに)
    screens.game.addEventListener('click', () => {
      if (!isMobile && gameState === 'game') document.body.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === document.body && gameState === 'game') {
        yaw -= e.movementX * 0.0015;
        pitch -= e.movementY * 0.0015;
        pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
      }
    });
    
    document.addEventListener('mousedown', (e) => {
      if (document.pointerLockElement === document.body && gameState === 'game' && e.button === 0) shoot();
    });

    // Mobile Input
    let joyMoveX = 0, joyMoveY = 0;
    const joyZone = document.getElementById('zone-joystick');
    const joyKnob = document.getElementById('joystick-knob');
    let joyTouchId = null;

    joyZone.addEventListener('touchstart', e => { e.preventDefault(); joyTouchId = e.changedTouches[0].identifier; updateJoystick(e.changedTouches[0]); });
    joyZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for(let i=0; i<e.changedTouches.length; i++) { if(e.changedTouches[i].identifier === joyTouchId) updateJoystick(e.changedTouches[i]); }
    });
    const resetJoy = () => { joyTouchId = null; joyMoveX = 0; joyMoveY = 0; joyKnob.style.transform = `translate(-50%, -50%)`; };
    joyZone.addEventListener('touchend', resetJoy); joyZone.addEventListener('touchcancel', resetJoy);

    function updateJoystick(touch) {
      const rect = joyZone.getBoundingClientRect();
      const dx = touch.clientX - (rect.left + rect.width / 2);
      const dy = touch.clientY - (rect.top + rect.height / 2);
      const maxDist = rect.width / 2;
      const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxDist);
      const angle = Math.atan2(dy, dx);
      joyKnob.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
      joyMoveX = (Math.cos(angle)*dist) / maxDist;
      joyMoveY = (Math.sin(angle)*dist) / maxDist;
    }

    // Mobile Look
    let lookTouchId = null;
    let lastTouchX = 0, lastTouchY = 0;
    const lookZone = document.getElementById('zone-look');

    lookZone.addEventListener('touchstart', e => {
      e.preventDefault(); if(lookTouchId !== null) return;
      const t = e.changedTouches[0]; lookTouchId = t.identifier; lastTouchX = t.clientX; lastTouchY = t.clientY;
    });
    lookZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for(let i=0; i<e.changedTouches.length; i++) {
        if(e.changedTouches[i].identifier === lookTouchId) {
          const t = e.changedTouches[i];
          // スワイプ感度を調整しマイルドに
          yaw -= (t.clientX - lastTouchX) * 0.0035;
          pitch -= (t.clientY - lastTouchY) * 0.0035;
          pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
          lastTouchX = t.clientX; lastTouchY = t.clientY;
        }
      }
    });
    const resetLook = () => { lookTouchId = null; };
    lookZone.addEventListener('touchend', resetLook); lookZone.addEventListener('touchcancel', resetLook);

    document.getElementById('btn-shoot').addEventListener('touchstart', (e) => { e.preventDefault(); if(gameState === 'game') shoot(); });

    // --- Game Logic ---
    
    const raycaster = new THREE.Raycaster();
    const speed = 0.22; // 少し速く
    const playerRadius = 0.4;
    let playerVelocity = new THREE.Vector3(); // 慣性移動用

    let targetEnemyPos = new THREE.Vector3(0,-10,0);
    let targetEnemyYaw = 0;

    function resetGameStats() {
      myHP = 100; enemyHP = 100;
      updateHPUI();
      if (isHost) { cameraContainer.position.set(0, 0, 20); yaw = Math.PI; } 
      else { cameraContainer.position.set(0, 0, -20); yaw = 0; }
      pitch = 0;
      playerVelocity.set(0,0,0);
    }

    function shoot() {
      if(myHP <= 0) return;
      
      cameraContainer.rotation.set(0, yaw, 0);
      camera.rotation.set(pitch, 0, 0);
      
      const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
      const origin = camera.getWorldPosition(new THREE.Vector3());
      
      // Weapon Recoil & Flash
      weaponGroup.position.z += 0.2; // 後ろにキックバック
      weaponGroup.rotation.x -= 0.1; // 上に跳ねる
      muzzleLight.intensity = 5;

      // Draw Laser
      drawThickLaser(origin, dir);

      // Hit Detection
      raycaster.set(origin, dir);
      const intersects = raycaster.intersectObjects(enemyGroup.children);
      
      if (intersects.length > 0 && enemyHP > 0) {
        const wallIntersects = raycaster.intersectObjects(collidables);
        if (wallIntersects.length === 0 || wallIntersects[0].distance > intersects[0].distance) {
          const hitPos = intersects[0].point;
          spawnHitParticles(hitPos); // 自分視点での血しぶき
          sendNetworkMessage({ t: 'h', d: 25, px: hitPos.x, py: hitPos.y, pz: hitPos.z }); // 25 damage
        }
      }

      sendNetworkMessage({ t: 's', p: {x: origin.x, y: origin.y, z: origin.z}, d: {x: dir.x, y: dir.y, z: dir.z} });
    }

    // 太いレーザー（Cylinder）で派手に
    function drawThickLaser(origin, dir) {
      const length = 60;
      const geo = new THREE.CylinderGeometry(0.05, 0.05, length, 8);
      geo.translate(0, length/2, 0);
      geo.rotateX(Math.PI / 2);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(origin);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir.clone().normalize());
      scene.add(mesh);
      
      const interval = setInterval(() => {
        mat.opacity -= 0.15;
        if(mat.opacity <= 0) { clearInterval(interval); scene.remove(mesh); }
      }, 16);
    }

    function showDamageEffect() {
      const overlay = document.getElementById('damage-overlay');
      overlay.style.opacity = '1';
      setTimeout(() => { overlay.style.opacity = '0'; }, 150);
    }

    function updateHPUI() {
      document.getElementById('my-hp-bar').style.width = Math.max(0, myHP) + '%';
      document.getElementById('enemy-hp-bar').style.width = Math.max(0, enemyHP) + '%';
    }

    function endGame(status, message) {
      gameState = 'RESULT';
      if (document.pointerLockElement === document.body) document.exitPointerLock();
      
      const title = document.getElementById('result-title');
      if (status === 'WIN') { title.innerText = 'TARGET ELIMINATED'; title.className = 'text-5xl font-black mb-4 uppercase text-cyan-400 drop-shadow-[0_0_10px_cyan]'; }
      else if (status === 'LOSE') { title.innerText = 'YOU DIED'; title.className = 'text-6xl font-black mb-4 uppercase text-red-600 drop-shadow-[0_0_20px_red] glitch-text'; }
      else { title.innerText = status; title.className = 'text-3xl font-bold mb-4 text-gray-400'; }
      
      document.getElementById('result-desc').innerText = message;
      showScreen('result');
      if(peerConnection) { peerConnection.close(); peerConnection = null; }
    }

    function handleNetworkMessage(data) {
      switch(data.t) {
        case 'p':
          targetEnemyPos.set(data.x, 0, data.z);
          targetEnemyYaw = data.ry;
          break;
        case 's':
          drawThickLaser(new THREE.Vector3(data.p.x, data.p.y, data.p.z), new THREE.Vector3(data.d.x, data.d.y, data.d.z));
          break;
        case 'h':
          myHP -= data.d;
          updateHPUI();
          showDamageEffect();
          if(data.px !== undefined) spawnHitParticles(new THREE.Vector3(data.px, data.py, data.pz));
          if (myHP <= 0) {
            sendNetworkMessage({ t: 'dead' });
            endGame('LOSE', '生命反応ロスト...');
          }
          break;
        case 'dead':
          enemyHP = 0;
          updateHPUI();
          endGame('WIN', 'ミッションコンプリート');
          break;
      }
    }

    function moveWithCollision(velocity) {
      const pos = cameraContainer.position;
      const nextPos = pos.clone().add(velocity);
      let collisionX = false, collisionZ = false;
      const myBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(playerRadius*2, 2, playerRadius*2));

      for (let obj of collidables) {
        const objBox = new THREE.Box3().setFromObject(obj);
        if (myBox.intersectsBox(objBox)) {
          const boxX = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(nextPos.x, pos.y, pos.z), new THREE.Vector3(playerRadius*2, 2, playerRadius*2));
          if (boxX.intersectsBox(objBox)) collisionX = true;
          const boxZ = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(pos.x, pos.y, nextPos.z), new THREE.Vector3(playerRadius*2, 2, playerRadius*2));
          if (boxZ.intersectsBox(objBox)) collisionZ = true;
        }
      }
      if (!collisionX) pos.x = nextPos.x;
      if (!collisionZ) pos.z = nextPos.z;
    }


    // --- Main Game Loop ---
    let lastNetworkSend = 0;

    function animate(time) {
      requestAnimationFrame(animate);

      if (gameState === 'game') {
        // Input to target velocity
        let moveX = 0, moveZ = 0;
        if (isMobile) { moveX = joyMoveX; moveZ = joyMoveY; } 
        else {
          if (keys.w) moveZ -= 1; if (keys.s) moveZ += 1;
          if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
          if (moveX !== 0 && moveZ !== 0) { const l = Math.sqrt(moveX*moveX + moveZ*moveZ); moveX /= l; moveZ /= l; }
        }

        const targetVel = new THREE.Vector3(moveX, 0, moveZ);
        if(targetVel.lengthSq() > 0) targetVel.applyAxisAngle(new THREE.Vector3(0,1,0), yaw).multiplyScalar(speed);
        
        // 慣性 Lerp
        playerVelocity.lerp(targetVel, 0.15);
        if (playerVelocity.lengthSq() > 0.0001) moveWithCollision(playerVelocity);

        // Apply Camera Rotation
        cameraContainer.rotation.set(0, yaw, 0);
        camera.rotation.set(pitch, 0, 0);

        // Weapon Animations (Recoil recovery & Bobbing)
        weaponGroup.position.z = THREE.MathUtils.lerp(weaponGroup.position.z, -0.4, 0.1);
        weaponGroup.rotation.x = THREE.MathUtils.lerp(weaponGroup.rotation.x, 0, 0.1);
        muzzleLight.intensity = Math.max(0, muzzleLight.intensity - 0.8);
        
        if (playerVelocity.lengthSq() > 0.001) {
          const bob = Math.sin(time * 0.015) * 0.015;
          weaponGroup.position.y = -0.25 + bob;
        }

        // Enemy Interpolation & Rotation
        enemyGroup.position.lerp(targetEnemyPos, 0.2);
        // 短い回転経路での補間
        const currentQ = enemyGroup.quaternion.clone();
        const targetQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), targetEnemyYaw);
        enemyGroup.quaternion.slerp(targetQ, 0.2);

        // Particles Update
        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.mesh.position.add(p.vel);
          p.vel.y -= 0.03; // gravity
          p.life -= 0.05;
          if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
        }

        // Network Sync (~15 fps)
        if (time - lastNetworkSend > 66 && myHP > 0) {
          sendNetworkMessage({ t: 'p', x: cameraContainer.position.x, z: cameraContainer.position.z, ry: yaw });
          lastNetworkSend = time;
        }
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate(0);

  </script>
</body>
</html>
